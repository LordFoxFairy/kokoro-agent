name: CI

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    # redis 集成测试(stream_port_redis)需真实 redis：提供服务容器，测试实跑而非跳过。
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      KOKORO_REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # 锁定依赖安装：uv.lock 用官方源锁定（UV_NO_CONFIG），CI 无本地镜像配置，直接走锁文件。
      - run: uv sync --locked
      - name: ruff
        run: uv run ruff check src tests
      - name: pyright
        run: uv run pyright
      - name: pytest
        run: uv run pytest -q
