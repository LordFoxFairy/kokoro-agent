[project]
name = "kokoro-agent"
version = "0.1.0"
description = "Kokoro agent runtime"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "deepagents",
  "httpx>=0.28.1",
  "langchain",
  "langchain-anthropic",
  "langchain-openai>=1.2.2",
  "langfuse>=4.7.1",
  "pydantic>=2",
  "pyyaml>=6.0.3",
  "python-dotenv>=1.2.2",
  "redis>=5",
]

[project.scripts]
kokoro-agent-worker = "kokoro_agent.interfaces.worker:main"

[dependency-groups]
dev = [
  "pyright>=1.1.380",
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "ruff>=0.6",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
pythonpath = ["src"]
asyncio_mode = "auto"

[tool.pyright]
include = ["src", "tests"]
typeCheckingMode = "strict"
pythonVersion = "3.11"

[tool.mypy]
python_version = "3.11"

# redis and langfuse ship no type stubs; mypy can't resolve them. They are real
# runtime deps, so silence the missing-stub import error rather than the usage.
[[tool.mypy.overrides]]
module = ["redis.*", "langfuse.*"]
ignore_missing_imports = true
