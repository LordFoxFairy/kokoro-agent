[project]
name = "kokoro-agent"
version = "0.1.0"
description = "Kokoro agent runtime"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "deepagents",
  "langchain",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
pythonpath = ["src"]
